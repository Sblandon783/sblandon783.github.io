<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- Color de la barra del navegador / barra de estado (Android, Chrome) -->
  <meta name="theme-color" content="#1B4332">

  <!-- Permite que el contenido se dibuje bajo la barra de estado en iOS -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="gym_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <style>
    /* Pinta de verde el fondo de la página para que la franja de la
       barra de estado (iOS PWA) se vea verde y no blanca. */
    html, body {
      margin: 0;
      background-color: #1B4332;
    }
  </style>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>gym_app</title>
  <link rel="manifest" href="manifest.json">

  <!-- Corbado Passkeys Web SDK (required by the passkeys_web plugin) -->
  <script src="bundle.js"></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
